name: Build and Release Installer

on:
  push:
    tags:
      - 'v*' # Trigger on version tags e.g., v1.3.0
  workflow_dispatch: # Allow manual triggering from the GitHub Actions UI

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Required to create a release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Application
        run: dotnet publish CBDownloader\CBDownloader.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Compile Inno Setup Installer
        run: iscc installer.iss # Windows runners have Inno Setup pre-installed in the PATH

      - name: Create Release and Upload Output
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Output/CBDownloaderInstaller.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
